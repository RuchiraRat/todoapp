<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Todo - [[${viewType}]]</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        .view-tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .view-tabs a { padding: 8px 16px; border: 1px solid #ddd; cursor: pointer; text-decoration: none; border-radius: 4px; }
        .view-tabs a.active { background: #4CAF50; color: white; }
        .group-header { font-size: 18px; font-weight: bold; margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 4px; }
        .stats { display: flex; gap: 20px; margin: 20px 0; }
        .stat-card { padding: 15px; background: #f9f9f9; border-radius: 4px; border-left: 4px solid #4CAF50; }
        .stat-number { font-size: 24px; font-weight: bold; color: #4CAF50; }
        .tasks-in-group { margin-left: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Todo Application</h1>
        <div class="view-tabs">
            <a th:href="@{/}" th:classappend="${viewType == 'list'} ? 'active' : ''">List</a>
            <a th:href="@{/daily}" th:classappend="${viewType == 'daily'} ? 'active' : ''">Daily</a>
            <a th:href="@{/weekly}" th:classappend="${viewType == 'weekly'} ? 'active' : ''">Weekly</a>
            <a th:href="@{/monthly}" th:classappend="${viewType == 'monthly'} ? 'active' : ''">Monthly</a>
        </div>

        <form th:action="@{/}" method="post" class="todo-form">
            <input type="text" name="title" placeholder="New Task" required class="form-input">
            <select name="period" class="form-input" style="flex: 0 0 100px;">
                <option value="day">Day</option>
                <option value="week">Week</option>
                <option value="month">Month</option>
            </select>
            <input type="time" name="dueTime" class="form-input" style="flex: 0 0 120px;" placeholder="Time">
            <button type="submit" class="btn btn-primary">Add</button>
        </form>

        <div class="stats">
            <div class="stat-card">
                <div>Total Tasks</div>
                <div class="stat-number" th:text="${stats.total}">0</div>
            </div>
            <div class="stat-card">
                <div>Completed</div>
                <div class="stat-number" th:text="${stats.completed}">0</div>
            </div>
            <div class="stat-card">
                <div>Pending</div>
                <div class="stat-number" th:text="${stats.pending}">0</div>
            </div>
            <div class="stat-card">
                <div>Completion Rate</div>
                <div class="stat-number" th:text="${stats.completionRate} + '%'">0%</div>
            </div>
        </div>
        <th:block th:each="entry : ${groupedTasks.entrySet()}">
            <div class="group-header">
                <span th:text="${entry.key}">Period</span>
                <span style="float: right; font-size: 14px;">
                    <span th:text="${#lists.size(entry.value)} + ' tasks'"></span>
                    <span>(<span th:text="${#lists.size(entry.value.?[completed])}"></span> done)</span>
                </span>
            </div>
            <div class="tasks-in-group">
                <ul class="todo-list">
                    <th:block th:each="task : ${entry.value}">
                        <li class="todo-item" th:classappend="${task.completed} ? 'completed' : ''">
                            <div class="todo-content">
                                <span th:text="${task.title}" th:classappend="${task.completed} ? 'completed' : ''"></span>
                                <div class="task-meta">
                                    <span th:if="${task.dueTime != null}" class="task-time" th:text="'🕐 ' + ${#temporals.format(task.dueTime, 'HH:mm')}"></span>
                                    <span th:if="${overdueMap[task.id]}" class="overdue-badge" th:text="'⚠️ OVERDUE'"></span>
                                    <span th:if="${reminderMap[task.id]}" class="reminder-badge" th:text="'⏰ REMINDER'"></span>
                                </div>
                            </div>
                            <div class="todo-actions">
                                <a th:href="@{/{id}/toggle(id=${task.id})}" class="action-link action-toggle btn-sm">Toggle</a>
                                <a th:href="@{/{id}/delete(id=${task.id})}" class="action-link action-delete btn-sm">Delete</a>
                            </div>
                        </li>
                    </th:block>
                </ul>
            </div>
        </th:block>
    </div>
</body>
</html>
